name: ardtire-dev

services:
  postgres:
    image: postgres:16
    container_name: ardtire-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ardtire}
      POSTGRES_USER: ${POSTGRES_USER:-ardtire}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ardtire_dev_password_change_me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ardtire_postgres_data:/var/lib/postgresql/data
    networks:
      - ardtire_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ardtire} -d ${POSTGRES_DB:-ardtire}"]
      interval: 5s
      timeout: 5s
      retries: 20

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: ardtire-keycloak
    restart: unless-stopped
    command: ["start-dev"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_dev_password_change_me}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: "xforwarded"
      # Use Postgres in later step; start with embedded H2 for dev simplicity in Step 9.
      # In Step 10 we will switch Keycloak to Postgres for production-shaped parity.
    ports:
      - "${KEYCLOAK_PORT:-8090}:8080"
    networks:
      - ardtire_net
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e \"GET / HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n\" >&3 && head -n 1 <&3 | grep -q \"200\"'"]
      interval: 10s
      timeout: 10s
      retries: 30

  mailpit:
    image: axllent/mailpit:latest
    container_name: ardtire-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_HTTP_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    networks:
      - ardtire_net

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: ardtire-meilisearch
    restart: unless-stopped
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-meili_dev_master_key_change_me}
    ports:
      - "${MEILI_PORT:-7700}:7700"
    volumes:
      - ardtire_meili_data:/meili_data
    networks:
      - ardtire_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7700/health | grep -q available"]
      interval: 10s
      timeout: 5s
      retries: 20

networks:
  ardtire_net:
    driver: bridge

volumes:
  ardtire_postgres_data:
  ardtire_meili_data:
